<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taxhund: 8-Bit Tax Barrage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260421m" />
  </head>
  <body>
    <main class="app">
      <div class="toolbar">
        <div class="lang-menu" aria-label="Language switcher">
          <span class="lang-label" id="lang-label">Language</span>
          <div class="lang-switch" role="group" aria-labelledby="lang-label">
            <a class="lang-button" data-lang="en" href="?lang=en" aria-current="page">EN</a>
            <a class="lang-button" data-lang="ja" href="?lang=ja">JP</a>
          </div>
        </div>
      </div>
      <div class="play-layout">
        <canvas id="game" width="224" height="320" aria-label="Taxhund bullet hell game"></canvas>
        <aside class="side-hud hidden" id="side-hud" aria-label="Game status">
          <section class="hud-card hud-life-card">
            <div class="hud-card-title" id="hud-life-label">LIFE</div>
            <div class="hud-hearts" id="hud-hearts"></div>
          </section>
          <section class="hud-card">
            <div class="hud-card-title" id="hud-bomb-label">BOMB (E)</div>
            <div class="hud-card-value" id="hud-bomb-value">3</div>
          </section>
          <section class="hud-card">
            <div class="hud-card-title" id="hud-power-label">POW</div>
            <div class="hud-card-value" id="hud-power-value">0</div>
          </section>
          <section class="hud-card">
            <div class="hud-card-title" id="hud-score-label">SCORE</div>
            <div class="hud-card-value hud-score-value" id="hud-score-value">00000000</div>
          </section>
          <section class="hud-card hidden" id="hud-boss-card">
            <div class="hud-card-title" id="hud-boss-label">BOSS 1</div>
            <div class="hud-boss-bar">
              <div class="hud-boss-fill" id="hud-boss-fill"></div>
            </div>
          </section>
        </aside>
      </div>
      <button type="button" class="overlay-button hidden" id="title-button">Return to Title</button>
      <div class="hint">WASD Move · SPACE Shoot · E Bomb · ESC Pause</div>
    </main>
    <script type="module" src="js/main.js?v=20260421m"></script>
  </body>
</html>
